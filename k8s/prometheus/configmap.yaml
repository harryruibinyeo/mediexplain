# Prometheus scrape configuration as a ConfigMap.
#
# In compose.yaml this was a file mounted at:
#   ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
#
# In Kubernetes, file mounts come from ConfigMaps. The prometheus Deployment
# mounts this ConfigMap at /etc/prometheus so prometheus finds its config
# at the same path it expects.
#
# The scrape targets use short Kubernetes Service DNS names ("inference",
# "api") — they resolve within the mediexplain namespace automatically.
# Full form would be inference.mediexplain.svc.cluster.local:8000

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mediexplain
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      - job_name: vllm
        static_configs:
          - targets: ["inference:8000"]
        metrics_path: /metrics

      - job_name: mediexplain_api
        static_configs:
          - targets: ["api:8001"]
        metrics_path: /metrics

      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
