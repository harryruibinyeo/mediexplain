# Sensitive credentials for MediExplain services.
# Uses stringData so you write plain text — Kubernetes base64-encodes it
# automatically when storing. Values are never shown in kubectl describe output.
#
# In a real production deployment these would come from an external secrets
# manager (HashiCorp Vault, AWS Secrets Manager, OpenShift Secrets Store CSI).
# For this portfolio project plain Secrets are fine.

apiVersion: v1
kind: Secret
metadata:
  name: mediexplain-secret
  namespace: mediexplain
type: Opaque
stringData:
  POSTGRES_PASSWORD:        "mediexplain"
  MINIO_ROOT_USER:          "minioadmin"
  MINIO_ROOT_PASSWORD:      "minioadmin"
  GF_SECURITY_ADMIN_USER:   "admin"
  GF_SECURITY_ADMIN_PASSWORD: "admin"
