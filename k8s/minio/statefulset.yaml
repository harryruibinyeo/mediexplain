# MinIO StatefulSet
#
# MinIO is an S3-compatible object store. Uses StatefulSet (not Deployment)
# for the same reason as postgres: stable storage binding via PVC.
#
# MinIO exposes two ports:
#   9000 — S3 API (used by the api service to upload PDFs)
#   9001 — Web console (open in browser to browse buckets)
#
# Credentials come from Secret, not ConfigMap, because they are passwords.

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: mediexplain
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: mediexplain-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediexplain-secret
                  key: MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: minio-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
